services:
  triver-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triver}
      POSTGRES_USER: ${POSTGRES_USER:-triver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triver}
    volumes:
      - triver_postgres:/var/lib/postgresql/data
    networks:
      triver_backend:

  triver-valkey:
    image: valkey/valkey:7.2-alpine
    restart: unless-stopped
    command: valkey-server --appendonly yes
    volumes:
      - triver_valkey:/data
    networks:
      triver_backend:
        aliases:
          # Compatibility for older local env files that still use redis://triver-redis.
          - triver-redis

  triver-clamav:
    image: clamav/clamav:1.5_base
    restart: unless-stopped
    environment:
      CLAMD_STARTUP_TIMEOUT: ${TRIVER_CLAMD_STARTUP_TIMEOUT:-1800}
    volumes:
      - triver_clamav_db:/var/lib/clamav
    networks:
      triver_backend:

  triver-backend:
    build:
      context: .
      dockerfile: deploy/containers/backend/Dockerfile
    restart: unless-stopped
    tty: true
    command: bash /backend/runner.sh web
    env_file:
      - ${TRIVER_SERVICE_ENV_FILE:-.env}
    environment:
      TRIVER_CLAMAV_HOST: ${TRIVER_CLAMAV_HOST:-triver-clamav}
      TRIVER_CLAMAV_PORT: ${TRIVER_CLAMAV_PORT:-3310}
    volumes:
      - ./backend:/backend
      - ${TRIVER_STORAGE_HOST_PATH:-./deploy/volumes}:/srv/triver
    depends_on:
      - triver-db
      - triver-valkey
      - triver-clamav
    networks:
      triver_backend:

  triver-worker:
    build:
      context: .
      dockerfile: deploy/containers/backend/Dockerfile
    restart: unless-stopped
    tty: true
    command: bash /backend/runner.sh worker
    env_file:
      - ${TRIVER_SERVICE_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
      - ${TRIVER_STORAGE_HOST_PATH:-./deploy/volumes}:/srv/triver
    depends_on:
      - triver-db
      - triver-valkey
    networks:
      triver_backend:

  triver-playback-worker:
    build:
      context: .
      dockerfile: deploy/containers/backend/Dockerfile
    restart: unless-stopped
    tty: true
    command: bash /backend/runner.sh worker
    env_file:
      - ${TRIVER_SERVICE_ENV_FILE:-.env}
    environment:
      TRIVER_CELERY_WORKER_QUEUES: playback
      TRIVER_CELERY_WORKER_CONCURRENCY: ${TRIVER_PLAYBACK_WORKER_CONCURRENCY:-1}
      TRIVER_CELERY_WORKER_PREFETCH_MULTIPLIER: 1
      TRIVER_WORKER_NICE: ${TRIVER_PLAYBACK_WORKER_NICE:-15}
      TRIVER_WORKER_IONICE_CLASS: ${TRIVER_PLAYBACK_WORKER_IONICE_CLASS:-3}
      TRIVER_WORKER_IONICE_LEVEL: ${TRIVER_PLAYBACK_WORKER_IONICE_LEVEL:-7}
    volumes:
      - ./backend:/backend
      - ${TRIVER_STORAGE_HOST_PATH:-./deploy/volumes}:/srv/triver
    depends_on:
      - triver-db
      - triver-valkey
    networks:
      triver_backend:

  triver-beat:
    build:
      context: .
      dockerfile: deploy/containers/backend/Dockerfile
    restart: unless-stopped
    tty: true
    command: bash /backend/runner.sh beat
    env_file:
      - ${TRIVER_SERVICE_ENV_FILE:-.env}
    volumes:
      - ./backend:/backend
      - ${TRIVER_STORAGE_HOST_PATH:-./deploy/volumes}:/srv/triver
    depends_on:
      - triver-db
      - triver-valkey
    networks:
      triver_backend:

  triver-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      triver-backend:
        condition: service_started
    ports:
      - "${TRIVER_PROXY_BIND:-127.0.0.1}:${TRIVER_PROXY_HTTP_PORT:-3080}:80"
    volumes:
      - ./frontend/package/build:/usr/share/nginx/html:ro
      - ./deploy/containers/proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      triver_backend:
      triver_vpn_edge:
        ipv4_address: ${TRIVER_PROXY_VPN_IP:-10.44.0.2}

  triver-vpn:
    image: ghcr.io/wg-easy/wg-easy:15
    profiles:
      - vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      PORT: 51821
      HOST: 0.0.0.0
      INSECURE: ${TRIVER_VPN_INSECURE:-true}
      DISABLE_IPV6: ${TRIVER_VPN_DISABLE_IPV6:-true}
    ports:
      - "${TRIVER_VPN_UDP_PORT:-51820}:51820/udp"
      - "127.0.0.1:${TRIVER_VPN_WEB_PORT:-51821}:51821/tcp"
    volumes:
      - triver_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    networks:
      triver_vpn_edge:
        ipv4_address: ${TRIVER_VPN_EDGE_IP:-10.44.0.3}

  triver-vpn-firewall:
    image: alpine:3.20
    profiles:
      - vpn
    restart: unless-stopped
    network_mode: "service:triver-vpn"
    depends_on:
      - triver-vpn
    cap_add:
      - NET_ADMIN
    environment:
      TRIVER_VPN_INTERFACE: wg0
      TRIVER_PROXY_VPN_IP: ${TRIVER_PROXY_VPN_IP:-10.44.0.2}
      TRIVER_PROXY_ALLOWED_PORTS: ${TRIVER_PROXY_ALLOWED_PORTS:-80}
    volumes:
      - ./deploy/containers/vpn-firewall/apply-rules.sh:/usr/local/bin/apply-rules.sh:ro
    command: >
      sh -lc "apk add --no-cache iptables iproute2 &&
      /usr/local/bin/apply-rules.sh"

networks:
  triver_backend:
    driver: bridge
  triver_vpn_edge:
    driver: bridge
    ipam:
      config:
        - subnet: ${TRIVER_VPN_EDGE_SUBNET:-10.44.0.0/24}

volumes:
  triver_postgres:
  triver_valkey:
  triver_clamav_db:
  triver_wireguard:
