name: Feature idea
description: Suggest an improvement or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What are you trying to do with your media library?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What would make that workflow feel right?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing tools, manual workarounds or related apps.
